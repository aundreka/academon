name: academon
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  phosphor_flutter: ^2.1.0
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
   - images/
  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter.ttf
    - family: Quicksand
      fonts:
        - asset: fonts/Quicksand.ttf
    - family: PressStart2P
      fonts:
        - asset: fonts/PressStart2P.ttf
    